<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites</title>

    <link rel="stylesheet" href="static/style.css"> 
</head>

<body>

    <div id="navbar-container"></div>

    <div class="page-title">
        Favorite Recipes
    </div>
        <input
            type="text"
            id="favorites-search"
            list="favorites-suggestions"
            placeholder="Search favorite recipes..."
            autocomplete="off"
            >
        <datalist id="favorites-suggestions"></datalist>
    <div id="favorites-container"></div>

    <script src="static/script.js"></script> 

    <script>
        async function loadFavoritesPage() {
            try {
                const authResponse = await fetch("/api/check-auth");
                const authData = await authResponse.json();

                if (!authData.loggedIn) {
                    window.location.href = "login.html";
                    return;
                }

                const response = await fetch("/api/favorites");

                if (response.status === 401) {
                    window.location.href = "login.html";
                    return;
                }

                const recipes = await response.json();

                const container = document.getElementById("favorites-container");

                container.innerHTML = "";

                if (recipes.length === 0) {
                    container.innerHTML = "<p>You have no favorite recipes yet.</p>";
                    return;
                }

                recipes.forEach(recipe => {
                    let ingredientsHTML = "";
                    let instructionsHTML = "";

                   let currentSection = "";

                    recipe.ingredients?.forEach(ingredient => {

                        const section = ingredient.section || "";

                        if (section !== currentSection) {

                            if (currentSection !== "") {
                                ingredientsHTML += `</ul>`;
                            }

                            if (section !== "") {
                                ingredientsHTML += `
                                    <h4 class="ingredient-section">
                                        ${section}
                                    </h4>
                                `;
                            }

                            ingredientsHTML += `<ul>`;

                            currentSection = section;
                        }

                        ingredientsHTML += `
                        <li>
                            <span 
                                class="ingredient-quantity"
                                data-recipe-id="${recipe.id}"
                                data-base-quantity="${ingredient.quantity}"
                            >
                                ${ingredient.quantity_text || ""}
                            </span>

                            ${ingredient.unit || ""}
                            ${ingredient.name}
                            ${ingredient.optional ? "(optional)" : ""}

                            </li>
                        `;
                    });

                    if (recipe.ingredients?.length > 0) {
                        ingredientsHTML += `</ul>`;
                    }

                    recipe.instructions?.forEach(instruction => {
                        instructionsHTML += `
                            <li>${instruction.instruction}</li>
                        `;
                    });

                    container.innerHTML += `
                        <div class="recipe-card" id="recipe-card-${recipe.id}">
                            <div class="recipe-content">

                                <div class="recipe-left">
                                    <h2>${recipe.title}</h2>

                                    <button class="favorite-button" onclick="removeFavorite(${recipe.id})">
                                        Remove from Favorites
                                    </button>

                                    <button class="print-button" onclick="printRecipe(${recipe.id})">
                                      Print Recipe
                                    </button>

                                    ${recipe.servings ? `<p><strong>Servings:</strong> ${recipe.servings}</p>` : ""}
                                    ${recipe.oven_temp_f ? `<p><strong>Oven:</strong> ${recipe.oven_temp_f}°F</p>` : ""}
                                    ${recipe.bake_time ? `<p><strong>Bake time:</strong> ${recipe.bake_time}</p>` : ""}
                                    ${recipe.pan_size ? `<p><strong>Pan:</strong> ${recipe.pan_size}</p>` : ""}

                                    <h3>Instructions</h3>
                                    <ol>
                                        ${instructionsHTML}
                                    </ol>

                                    ${recipe.notes ? `
                                        <p>
                                            <strong>Notes:</strong><br>
                                            ${recipe.notes.replace(/\.\s/g, ".<br>")}
                                        </p>
                                    ` : ""}
                                </div>

                                <div class="recipe-middle">
                                  <br>
                                    <div class="serving-buttons">
                                        <button onclick="updateIngredients(${recipe.id}, 1)">1x</button>
                                        <button onclick="updateIngredients(${recipe.id}, 2)">2x</button>
                                        <button onclick="updateIngredients(${recipe.id}, 3)">3x</button>
                                    </div>

                                    <h3>Ingredients</h3>

                                    
                                        ${ingredientsHTML}
                                    
                                </div>

                                <div class="recipe-image">
                                    <img
                                        src="${recipe.image_url}"
                                        alt="${recipe.title}"
                                    >
                                </div>

                            </div>
                        </div>
                    `;



                    
                });

                //favorites DataList
                const favoritesSuggestionList =
                document.getElementById("favorites-suggestions");

                if (favoritesSuggestionList) {

                favoritesSuggestionList.innerHTML = "";

                recipes.forEach(recipe => {

                    favoritesSuggestionList.innerHTML += `
                    <option value="${recipe.title}">
                    `;

                });

                }

                //favorites search functionality
                const favoritesSearch =
                document.getElementById("favorites-search");

                if (favoritesSearch) {

                favoritesSearch.addEventListener("input", function () {

                    const searchTerm =
                    favoritesSearch.value.toLowerCase();

                    const recipeCards =
                    document.querySelectorAll(".recipe-card");

                    recipeCards.forEach(card => {

                    const title =
                        card.querySelector("h2")
                        .textContent
                        .toLowerCase();

                    if (title.includes(searchTerm)) {

                        card.style.display = "block";

                    } else {

                        card.style.display = "none";

                    }

                    });

                });

                }


            } catch (error) {
                console.error("Favorites page error:", error);
            }
        }

        loadFavoritesPage();

        // Remove a recipe from favorites
        async function removeFavorite(recipeId) {
    try {
        const response = await fetch(`/api/favorites/${recipeId}`, {
            method: "DELETE"
        });

        const data = await response.json();

        if (data.success) {
            location.reload();
        } else {
            showPopup(data.message);
        }

    } catch (error) {
        console.error("Remove favorite error:", error);
    }
}

function updateIngredients(recipeId, multiplier) {

  const quantities = document.querySelectorAll(
    `.ingredient-quantity[data-recipe-id="${recipeId}"]`
  );

  quantities.forEach(quantitySpan => {

    const baseQuantity = parseFloat(
      quantitySpan.dataset.baseQuantity
    );

    if (isNaN(baseQuantity)) {
      quantitySpan.textContent = "";
      return;
    }

    quantitySpan.textContent =
      formatQuantity(baseQuantity * multiplier);

  });

}


</script>

</body>
</html>
